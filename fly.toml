app = "tiny-homes42"
primary_region = "iad"

# Do NOT use release_command with SQLite.
# Release commands run in a temporary machine WITHOUT the volume mounted,
# so db:migrate would create a throwaway database instead of migrating
# the real one. Migrations run at startup via bin/docker-entrypoint instead.

[build]

[env]
  RAILS_ENV = "production"
  RAILS_LOG_TO_STDOUT = "1"
  RAILS_SERVE_STATIC_FILES = "1"
  DATABASE_PATH = "/data/production.sqlite3"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume for SQLite database.
# The database file lives here and survives deploys, restarts, and image rebuilds.
[[mounts]]
  source = "data"
  destination = "/data"

# Health check
[[services.http_checks]]
  interval = 10000
  grace_period = "10s"
  method = "GET"
  path = "/"
  protocol = "http"
  timeout = 2000

# IMPORTANT: Never scale beyond 1 machine with SQLite.
# SQLite is single-writer. Multiple machines = data corruption.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
